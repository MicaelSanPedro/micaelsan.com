<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARMACORE | Micael San</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#00d2ff;
            --secondary:#9d50bb;
            --bg:#050505;
            --warning:#ffcc00;
            --info-text: #b3b3b3;
        }
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 210, 255, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body{
            font-family:'Poppins',sans-serif;
            background:var(--bg) radial-gradient(circle at top,#1a1a2e 0%,#050505 100%) no-repeat fixed;
            color:white;
            min-height:100vh;
            padding:20px;
            overflow-x:hidden;
            display:flex;
            flex-direction:column;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 999;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container{
            max-width:520px;
            width:100%;
            margin:auto;
            flex:1;
            animation: fadeUp 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
            position: relative;
            z-index: 10;
        }

        header{
            text-align:center;
            padding:40px 0 20px 0;
        }
        header h1{
            font-family:'Orbitron',sans-serif;
            font-size:clamp(2rem,8vw,3.5rem);
            letter-spacing:5px;
            text-transform:uppercase;
            background:linear-gradient( to right, #ff0000,#ff00ff,#0000ff,#00ffff,#00ff00,#ffff00,#ff0000 );
            background-size:400%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation:rainbow 8s linear infinite;
        }
        @keyframes rainbow{ 0%{background-position:0%} 100%{background-position:400%} }
        header span{ display:block; font-size:clamp(.7rem,3vw,1rem); letter-spacing:6px; opacity:.5; margin-top:5px; }

        .search-wrapper {
            margin-bottom: 20px;
        }
        #appSearch {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        #appSearch:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .folder{
            background:rgba(255,255,255,.02);
            border:1px solid rgba(255,255,255,.05);
            border-radius:14px;
            overflow:hidden;
            margin-bottom:15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .folder-header{
            padding:20px;
            cursor:pointer;
            display:flex;
            justify-content:space-between;
            align-items:center;
            font-weight:700;
            letter-spacing: 1px;
            transition: background 0.3s ease;
        }
        .folder-header span {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: var(--primary);
            font-size: 1.2rem;
        }
        .folder-header.active span {
            transform: rotate(180deg);
        }

        .content{
            max-height:0;
            overflow:hidden;
            opacity:0;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            padding:0 20px;
        }
        .content.open{
            max-height:1800px;
            opacity:1;
            padding-bottom:20px;
        }

        .sub-folder {
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            border-left: 2px solid var(--primary);
            border-radius: 0 12px 12px 0;
        }

        .btn{
            display:flex;
            align-items:center;
            gap:12px;
            background:rgba(255,255,255,.04);
            color:white;
            padding:14px 18px;
            margin-top:10px;
            text-decoration:none;
            border-radius:10px;
            font-size:0.95rem;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-box{
            font-size:.8rem;
            padding:12px 15px;
            border-radius:8px;
            margin:12px 0 20px 35px;
            border:1px solid rgba(0,210,255,.2);
            background:rgba(0,210,255,.02);
            position:relative;
            color: var(--info-text);
        }

        .coffee-btn{
            position:fixed; bottom:25px; right:25px; width:75px; height:75px;
            background: rgba(255,255,255,0.03); border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            z-index:1000; animation: pulseGlow 3s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        #modal-overlay{ 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,.7); backdrop-filter: blur(8px);
            display:none; align-items:center; justify-content:center; z-index:2000; 
        }
        .modal{ 
            background:linear-gradient(145deg, rgba(20,20,25,0.95), rgba(10,10,15,0.95)); 
            padding:40px 30px; border-radius:24px; border: 1px solid rgba(0, 210, 255, 0.2);
            text-align:center; max-width:360px; width:90%; opacity:0; 
            transition:.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position:relative; 
        }
        .modal.show{ opacity:1; transform: scale(1); }

        .pix-display {
            background: #030303; padding: 18px; border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.3); color: var(--primary);
            font-family: monospace; font-size: 0.85rem; word-break: break-all;
            margin-top: 25px; display: flex; align-items: center; justify-content: space-between;
        }

        .copy-icon-btn {
            background: none; border: none; color: var(--primary);
            cursor: pointer; padding: 5px; opacity: 0.6; transition: 0.3s;
        }
        .copy-icon-btn:hover { opacity: 1; transform: scale(1.2); }

        footer{ text-align:center; padding:40px 20px; opacity:.4; font-size:.75rem; margin-top: auto;}

        /* ESTILOS DO CAFÉ */
        .cup-wrapper{ position:relative; transform: scale(0.8); display: flex; flex-direction: column; align-items: center; }
        .cup{ width:45px; height:40px; background:#fff; border-radius:6px 6px 22px 22px; }
        .cup-handle{ position:absolute; right:-14px; top:8px; width:18px; height:22px; border:5px solid #fff; border-radius:40% 15px 15px 40%; }
        .saucer{ position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); width:65px; height:10px; background:#f0f0f0; border-radius:50%; }
        .smoke{ position:absolute; bottom:20px; width:16px; height:50px; background:linear-gradient(to top,rgba(255,255,255,.8),transparent); border-radius:50%; filter:blur(5px); opacity:0; animation:steam 4s infinite ease-in-out; }
        @keyframes steam{ 0%{ transform:translateY(0) scale(.8); opacity:0; } 50%{ opacity:.8; } 100%{ transform:translateY(-80px) scale(2); opacity:0; } }
    </style>
</head>
<body>

    <div class="coffee-btn" onclick="openModal()">
        <div class="cup-wrapper">
            <div class="smoke"></div>
            <div class="cup"></div>
            <div class="cup-handle"></div>
            <div class="saucer"></div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal" class="modal" onclick="event.stopPropagation()">
            <h2 style="font-family: 'Orbitron'; font-size: 1.4rem; margin-bottom: 10px;">☕ APOIE</h2>
            <div class="pix-display">
                <span id="pixValue">1ad6a146-8d7e-4521-a96a-fde7ccd602ac</span>
                <button class="copy-icon-btn" onclick="copyOnlyPix()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
            <p style="font-size: 0.65rem; color: var(--secondary); margin-top: 15px;">[ CLIQUE NO ÍCONE PARA COPIAR ]</p>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>KARMACORE</h1>
            <span>Micael San</span>
        </header>

        <div class="search-wrapper">
            <input type="text" id="appSearch" placeholder="Procurar apps..." onkeyup="filterApps()">
        </div>

        <div class="folder" id="mainFolder">
            <div class="folder-header" onclick="toggleFolder(this)">
                CENTRAL DE APPS <span>+</span>
            </div>
            <div class="content">
                <div class="folder sub-folder app-item">
                    <div class="folder-header" onclick="toggleFolder(this)">WINDOWS <span>+</span></div>
                    <div class="content"><a href="#" class="btn">Karmacore.exe</a></div>
                </div>
            </div>
        </div>
    </div>

    <footer>© 2026 | Rondonópolis - MT</footer>

    <script>
        function toggleFolder(header){
            const content = header.nextElementSibling;
            header.classList.toggle('active');
            content.classList.toggle('open');
            header.querySelector('span').textContent = content.classList.contains('open') ? '−' : '+';
        }

        function filterApps() {
            const input = document.getElementById('appSearch').value.toLowerCase();
            const apps = document.querySelectorAll('.app-item');
            apps.forEach(app => {
                app.style.display = app.innerText.toLowerCase().includes(input) ? "block" : "none";
            });
        }

        // AQUI ESTÁ A CORREÇÃO DEFINITIVA
        function copyOnlyPix() {
            // Criamos uma variável de texto puro, sem chance de pegar HTML
            const textToCopy = "1ad6a146-8d7e-4521-a96a-fde7ccd602ac";
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Chave PIX copiada!");
            }).catch(err => {
                // Fallback caso o navegador bloqueie o clipboard
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                alert("Chave PIX copiada!");
            });
        }

        function openModal(){
            document.getElementById("modal-overlay").style.display = "flex";
            setTimeout(() => document.getElementById("modal").classList.add("show"), 10);
        }

        function closeModal(){
            document.getElementById("modal").classList.remove("show");
            setTimeout(() => document.getElementById("modal-overlay").style.display = "none", 400);
        }
    </script>
</body>
</html>
