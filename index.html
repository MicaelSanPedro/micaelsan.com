<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◤✞ 𝕸𝖎𝖈𝖆𝖊𝖑 𝕾𝖆𝖓 ✞◥</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    :root { --primary: #00d2ff; --secondary: #9d50bb; --bg: #050505; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg) radial-gradient(circle at top, #1a1a2e 0%, #050505 100%) no-repeat fixed;
      color: white; min-height: 100vh; padding: 20px;
    }
    header { padding: 40px 20px; text-align: center; }
    header h1 { 
      font-size: 2.2rem; background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

    .folder {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; backdrop-filter: blur(10px); overflow: hidden;
    }
    .folder-header {
      padding: 15px 20px; cursor: pointer; display: flex; align-items: center; 
      justify-content: space-between; font-weight: 600; transition: 0.3s;
    }
    .folder-header:hover { background: rgba(255, 255, 255, 0.08); }
    
    .content {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: all 0.5s cubic-bezier(0, 1, 0.5, 1); padding: 0 15px;
    }
    .content.open { max-height: 1000px; opacity: 1; padding-bottom: 15px; }

    .sub-folder { margin-top: 10px; background: rgba(0, 0, 0, 0.3); border-radius: 8px; }
    .sub-header {
      padding: 12px; cursor: pointer; display: flex; justify-content: space-between;
      border-left: 3px solid var(--primary); font-size: 0.9rem; color: #ccc;
    }

    .btn {
      display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.05);
      color: white; padding: 12px; margin: 8px 0; text-decoration: none;
      border-radius: 8px; font-size: 0.9rem; transition: 0.3s;
    }
    .btn:hover { background: var(--primary); color: #000; transform: translateX(5px); }

    svg { width: 20px; height: 20px; fill: var(--primary); flex-shrink: 0; }
    .arrow { transition: 0.3s; opacity: 0.5; font-size: 0.7rem; }
    .rotate { transform: rotate(180deg); }
    footer { text-align: center; margin-top: 40px; opacity: 0.4; font-size: 0.7rem; }
  </style>
</head>
<body>

<div id="main-content">
  <header>
    <h1>◤✞ 𝕸𝖎𝖈𝖆𝖊𝖑 𝕾𝖆𝖓 ✞◥</h1>
    <p style="opacity: 0.5; font-size: 0.9rem;">Central de Downloads</p>
  </header>

  <div class="container">
    <div class="folder">
      <div class="folder-header" onclick="toggle(this)">
        <div style="display:flex; align-items:center; gap:10px;">
          <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
          Apps
        </div>
        <span class="arrow">▼</span>
      </div>
      
      <div class="content">
        <div class="sub-folder">
          <div class="sub-header" onclick="toggle(this)">
            <span>💻 Softwares PC</span> <span class="arrow">▼</span>
          </div>
          <div class="content">
            <a href="#" class="btn">📜 Lua Tools</a>
            <a href="#" class="btn">⚙️ Millennium</a>
            <a href="#" class="btn">🎮 Steam Tools</a>
          </div>
        </div>

        <div class="sub-folder">
          <div class="sub-header" onclick="toggle(this)">
            <span>🤖 Mobile Android</span> <span class="arrow">▼</span>
          </div>
          <div class="content">
            <a href="#" class="btn">💬 WhatsApp Pro</a>
            <a href="#" class="btn">📸 Insta Mod</a>
          </div>
        </div>
      </div>
    </div>

    <div class="folder">
      <div class="folder-header" onclick="toggle(this)">
        <div style="display:flex; align-items:center; gap:10px;">
          <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
          Mods & Scripts
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="content">
        <a href="#" class="btn">📦 Minecraft Scripts</a>
        <a href="#" class="btn">👻 Ghost Menu</a>
      </div>
    </div>
  </div>

  <footer>© 2025 | 𝕸𝖎𝖈𝖆𝖊𝖑 𝕾𝖆𝖓</footer>
</div>

<script>
  function toggle(header) {
    const content = header.nextElementSibling;
    const arrow = header.querySelector('.arrow');
    content.classList.toggle('open');
    if(arrow) arrow.classList.toggle('rotate');
  }
</script>

</body>
</html>
